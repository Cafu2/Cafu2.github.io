<!DOCTYPE html>
<html>
<head>
<title>موقع Cafu للروايات</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    background: black;
  }

  h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 50px;
  }

  #stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://i.ibb.co/x1q0rPS/space-stars.gif') repeat;
    background-size: cover;
    z-index: -1;
  }

  .chapter {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
  }

  .chapter h2 {
    text-align: center;
    font-size: 30px;
  }
</style>
</head>

<body>

<div id="stars"></div>

<h1>موقع Cafu للروايات</h1>

<div class="chapter">
  <h2>الفصل 1: مدينة الظلال</h2>
  <p>
  في ليلة هادئة كان سامي يمشي في المدينة عندما وجد بابًا غريبًا...
  وعندما فتحه دخل إلى عالم مليء بالأسرار والظلال.
  </p>
</div>

<div class="chapter">
  <h2>الفصل 2: الأسرار المظلمة</h2>
  <p>
  المدينة كانت مليئة بالمباني المتحركة والشوارع الغريبة، وكل خطوة يقربه من الحقيقة...
  </p>
</div>

</body>
</html>
