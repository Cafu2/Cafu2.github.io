<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقع Cafu للروايات</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    background: black;
  }
  h1 {
    text-align: center;
    margin-top: 30px;
    font-size: 50px;
    z-index: 2;
    position: relative;
  }
  .chapter {
    max-width: 800px;
    margin: 50px auto;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
    position: relative;
    z-index: 2;
  }
  .chapter h2 { text-align: center; font-size: 30px; }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<h1>موقع Cafu للروايات</h1>

<div class="chapter">
  <h2>الفصل 1: مدينة الظلال</h2>
  <p>
  في ليلة هادئة كان سامي يمشي في المدينة عندما وجد بابًا غريبًا...
  وعندما فتحه دخل إلى عالم مليء بالأسرار والظلال.
  </p>
</div>

<div class="chapter">
  <h2>الفصل 2: الأسرار المظلمة</h2>
  <p>
  المدينة كانت مليئة بالمباني الغريبة والشوارع المتحركة، وكل خطوة تقربه من الحقيقة...
  </p>
</div>

<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

const stars = [];
for(let i=0;i<200;i++){
  stars.push({
    x: Math.random()*w,
    y: Math.random()*h,
    radius: Math.random()*1.5,
    speed: Math.random()*0.5+0.1
  });
}

function animate(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = "white";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
    ctx.fill();
    s.y -= s.speed;
    if(s.y<0) s.y = h;
  });
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
